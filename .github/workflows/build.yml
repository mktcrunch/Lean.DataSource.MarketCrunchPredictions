name: Build & Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Copy sample data to LEAN Data folder
        run: cp -r ../Lean.DataSource.MarketCrunchPredictions/output/* ../Lean/Data/

      - name: Start container
        run: |
          docker run -d \
            --workdir /__w/Lean.DataSource.MarketCrunchPredictions/Lean.DataSource.MarketCrunchPredictions \
            -v /home/runner/work:/__w \
            --name test-container \
            quantconnect/lean:foundation \
            tail -f /dev/null

      - name: Build DataSource
        run: runInContainer dotnet build ./QuantConnect.DataSource.csproj /p:Configuration=Release /v:quiet /p:WarningLevel=1

      - name: Build Tests
        run: runInContainer dotnet build ./tests/Tests.csproj /p:Configuration=Release /v:quiet /p:WarningLevel=1

      - name: Run Tests
        run: runInContainer dotnet test ./tests/bin/Release/net10.0/Tests.dll

      - name: Build LEAN Launcher
        run: runInContainer dotnet build ../Lean/Launcher/QuantConnect.Lean.Launcher.csproj /p:Configuration=Release /p:OutputPath=bin/Release /v:quiet /p:WarningLevel=1

      - name: Copy DataSource to LEAN Launcher
        run: runInContainer cp ./tests/bin/Release/net10.0/QuantConnect.DataSource.MarketCrunchPredictions.dll ../Lean/Launcher/bin/Release/

      - name: Run C# Demo Algorithm
        run: |
          output=$(runInContainer bash -c "cd ../Lean/Launcher/bin/Release && dotnet ./QuantConnect.Lean.Launcher.dll --data-folder /__w/Lean.DataSource.MarketCrunchPredictions/Lean/Data/ --algorithm-language CSharp --algorithm-type-name MarketCrunchPredictionsAlgorithm --algorithm-location /__w/Lean.DataSource.MarketCrunchPredictions/Lean.DataSource.MarketCrunchPredictions/tests/bin/Release/net10.0/Tests.dll --close-automatically true" 2>&1)
          echo "$output"
          echo "$output" | grep -q "STATISTICS:: Total Orders [^0]" || { echo "Algorithm placed no trades"; exit 1; }

      - name: Run Python Demo Algorithm
        run: |
          output=$(runInContainer bash -c 'cd ../Lean/Launcher/bin/Release && dotnet ./QuantConnect.Lean.Launcher.dll --data-folder /__w/Lean.DataSource.MarketCrunchPredictions/Lean/Data/ --algorithm-language Python --algorithm-type-name MarketCrunchPredictionsAlgorithm --algorithm-location /__w/Lean.DataSource.MarketCrunchPredictions/Lean.DataSource.MarketCrunchPredictions/MarketCrunchPredictionsAlgorithm.py --close-automatically true' 2>&1) || true
          echo "$output"
          echo "$output" | grep -q "STATISTICS:: Total Orders [^0]" || { echo "Algorithm placed no trades"; exit 1; }

      - name: Stop container
        run: docker rm -f test-container
